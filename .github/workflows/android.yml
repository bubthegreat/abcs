name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lets-learn-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    # Auto-incrementing release on every main push; run_number never repeats.
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk lets-learn-v1.0.${{ github.run_number }}.apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Let's Learn v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: lets-learn-v1.0.${{ github.run_number }}.apk
